# Netlify configuration for Smart Financial Analyzer (mangopilot)
# Static site — no build step. Project root is the publish directory.
# Sensitive/internal folders are blocked from public access via redirects.

[build]
  publish = "."

# ─── Block internal/server-side folders from being publicly served ────────
# These exist in the repo but should NOT be reachable on the public CDN.

# Edge function source code (already deployed server-side to Supabase)
[[redirects]]
  from = "/supabase/*"
  to = "/404.html"
  status = 404
  force = true

# Nexus-intel reference research material (not part of the public app)
[[redirects]]
  from = "/nexus-intel/*"
  to = "/404.html"
  status = 404
  force = true

# Editor / IDE config
[[redirects]]
  from = "/.claude/*"
  to = "/404.html"
  status = 404
  force = true

# Any dotfiles (.git, .env, .DS_Store, etc.)
[[redirects]]
  from = "/.*"
  to = "/404.html"
  status = 404
  force = true

# ─── Cache control ────────────────────────────────────────────────────────
# index.html, app.js, styles.css are updated frequently during active dev.
# Use no-cache so the browser always revalidates on reload — eliminates
# the "user can't see my latest changes without hard-refresh" problem.

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/app.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/styles.css"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# ─── Security headers ─────────────────────────────────────────────────────

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
